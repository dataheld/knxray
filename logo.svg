<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" width="400" height="460">
  <!--
    knxray logo – v6 "3D diff houses"
    Two isometric houses, same footprint, offset in isometric space.
    OLD (red)   shifted back-left  — the removed version.
    NEW (green) shifted front-right — the added version.
    Both semi-transparent; hidden edges shown dashed = X-ray wireframe.
    +/− signs live in the upper corners, fully separate from the houses.

    Isometric basis vectors (screen px per unit):
      width  direction → (+28, +14)
      depth  direction → (−20, +10)
      height direction → (  0, −40)

    OLD house anchor A=(94,136), NEW anchor A=(106,128)  [Δ = (−12,+8) / (+12,−8)]
  -->
  <defs>
    <clipPath id="hexClip">
      <polygon points="100,3 197,59 197,171 100,227 3,171 3,59"/>
    </clipPath>
    <pattern id="grid" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#0e2a18" stroke-width="0.45"/>
    </pattern>
    <!-- Glow on NEW house only — marks it as the active/current state -->
    <filter id="greenGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background + subtle blueprint grid -->
  <polygon points="100,3 197,59 197,171 100,227 3,171 3,59" fill="#060f0a"/>
  <rect x="0" y="0" width="200" height="230"
    fill="url(#grid)" clip-path="url(#hexClip)" opacity="0.85"/>

  <!-- ────────────────────────────────────────────
       OLD HOUSE  (red, ghost — the removed state)
       A(94,136)  B(122,150)  C(102,160)  D(74,146)
       At(94,96)  Bt(122,110) Ct(102,120) Dt(74,106)
       Peak(98,86)
  ──────────────────────────────────────────── -->

  <!-- face fills: very faint red, lighter on top/roof, darker on shadow side -->
  <polygon points="94,96  122,110 102,120 74,106"  fill="#f87171" opacity="0.10"/><!-- top -->
  <polygon points="94,136 94,96  74,106  74,146"   fill="#f87171" opacity="0.07"/><!-- front-left wall -->
  <polygon points="94,136 122,150 122,110 94,96"   fill="#f87171" opacity="0.05"/><!-- front-right wall -->
  <polygon points="94,96  122,110 98,86"           fill="#f87171" opacity="0.08"/><!-- roof front slope -->
  <polygon points="122,110 102,120 98,86"          fill="#f87171" opacity="0.06"/><!-- roof right slope -->

  <!-- dashed hidden edges (X-ray: we see through the walls) -->
  <g stroke="#f87171" stroke-width="1" stroke-dasharray="3 3"
     fill="none" opacity="0.38">
    <line x1="74"  y1="146" x2="102" y2="160"/><!-- D→C  back-bottom-left  -->
    <line x1="122" y1="150" x2="102" y2="160"/><!-- B→C  back-bottom-right -->
    <line x1="102" y1="160" x2="102" y2="120"/><!-- C→Ct back-right vertical-->
    <line x1="74"  y1="106" x2="98"  y2="86" /><!-- Dt→Peak back-left roof  -->
    <line x1="102" y1="120" x2="98"  y2="86" /><!-- Ct→Peak back-right roof -->
  </g>

  <!-- solid visible outlines -->
  <g stroke="#f87171" stroke-width="1.4" stroke-linejoin="round"
     fill="none" opacity="0.62">
    <polygon points="94,136 94,96  74,106  74,146"/>
    <polygon points="94,136 122,150 122,110 94,96"/>
    <polygon points="94,96  122,110 102,120 74,106"/>
    <polygon points="94,96  122,110 98,86"/>
    <polygon points="122,110 102,120 98,86"/>
  </g>

  <!-- ────────────────────────────────────────────
       NEW HOUSE  (green, vivid — the added state)
       A(106,128) B(134,142) C(114,152) D(86,138)
       At(106,88) Bt(134,102) Ct(114,112) Dt(86,98)
       Peak(110,78)
  ──────────────────────────────────────────── -->

  <!-- face fills -->
  <polygon points="106,88  134,102 114,112 86,98"  fill="#6dc537" opacity="0.15"/><!-- top -->
  <polygon points="106,128 106,88  86,98   86,138" fill="#6dc537" opacity="0.11"/><!-- front-left wall -->
  <polygon points="106,128 134,142 134,102 106,88" fill="#6dc537" opacity="0.08"/><!-- front-right wall -->
  <polygon points="106,88  134,102 110,78"         fill="#6dc537" opacity="0.12"/><!-- roof front slope -->
  <polygon points="134,102 114,112 110,78"         fill="#6dc537" opacity="0.09"/><!-- roof right slope -->

  <!-- dashed hidden edges -->
  <g stroke="#6dc537" stroke-width="1" stroke-dasharray="3 3"
     fill="none" opacity="0.44">
    <line x1="86"  y1="138" x2="114" y2="152"/>
    <line x1="134" y1="142" x2="114" y2="152"/>
    <line x1="114" y1="152" x2="114" y2="112"/>
    <line x1="86"  y1="98"  x2="110" y2="78" />
    <line x1="114" y1="112" x2="110" y2="78" />
  </g>

  <!-- solid visible outlines — with green glow to read as the "active" scan -->
  <g filter="url(#greenGlow)" stroke="#6dc537" stroke-width="1.8"
     stroke-linejoin="round" fill="none" opacity="0.92">
    <polygon points="106,128 106,88  86,98   86,138"/>
    <polygon points="106,128 134,142 134,102 106,88"/>
    <polygon points="106,88  134,102 114,112 86,98"/>
    <polygon points="106,88  134,102 110,78"/>
    <polygon points="134,102 114,112 110,78"/>
  </g>

  <!-- ────────────────────────────────────────────
       DIFF SIGNS — own corners, nothing overlapping
  ──────────────────────────────────────────── -->
  <text x="26" y="68"
    font-family="'Courier New', Courier, monospace"
    font-size="30" font-weight="700"
    dominant-baseline="central" text-anchor="middle"
    fill="#f87171">-</text>

  <text x="170" y="60"
    font-family="'Courier New', Courier, monospace"
    font-size="30" font-weight="700"
    dominant-baseline="central" text-anchor="middle"
    fill="#6dc537">+</text>

  <!-- Hex border (KNX green) + package name -->
  <polygon points="100,3 197,59 197,171 100,227 3,171 3,59"
    fill="none" stroke="#57a639" stroke-width="4"/>

  <text x="100" y="190"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="22" font-weight="700" letter-spacing="1"
    fill="#d4f5b8">knxray</text>
</svg>
